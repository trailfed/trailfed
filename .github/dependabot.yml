version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: "/server"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
