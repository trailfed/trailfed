# TrailFed dev stack. See docs/deployment.md for production notes.

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: trailfed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trailfed_dev_only}
      POSTGRES_DB: trailfed
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trailfed -d trailfed']
      interval: 10s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo --config=/centrifugo/config.json
    volumes:
      - ./infra/centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - '127.0.0.1:8091:8000'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://trailfed:${POSTGRES_PASSWORD:-trailfed_dev_only}@postgres:5432/trailfed
      CENTRIFUGO_URL: http://centrifugo:8000
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost:8090}
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O- http://localhost:3000/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      NODE_ENV: production
      PUBLIC_API_ORIGIN: ${PUBLIC_API_ORIGIN:-http://localhost:8090}
    depends_on:
      server:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/pmtiles:/srv/pmtiles:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - '127.0.0.1:8090:80'
    depends_on:
      - server
      - web

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
